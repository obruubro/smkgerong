<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMA - SMKN KASOMALANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sub-tab-content { display: none; }
        .sub-tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 w-full max-w-sm text-center">

            <input type="password" id="admin-password" placeholder="Password Admin" class="w-full p-4 mb-4 border border-slate-200 rounded-2xl bg-slate-50 focus:border-indigo-500 outline-none text-center font-bold">
            <button onclick="window.handleLogin()" class="w-full bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-800 transition-all">Login Sistem</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden pb-32">
        <header class="bg-white border-b border-slate-100 sticky top-0 z-50 shadow-sm">
            <div class="max-w-md mx-auto flex justify-between items-center p-4">
               <button onclick="window.showTab('tab-dashboard')" class="flex items-center gap-2 group outline-none">
                <div class="bg-indigo-700 text-white font-black p-2 rounded-xl text-lg tracking-tighter group-hover:bg-indigo-800 transition-colors">
                    <img src="logo.png" alt="Logo" onerror="this.src='https://placehold.co/40x40/4338ca/ffffff?text=K'" class="size-8 object-contain">
                </div>
                <div class="text-left">
                    <h1 class="font-black text-indigo-900 tracking-tight text-xl leading-none">KARMA</h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">SMKN KASOMALANG</p>
                </div>
            </button>
                
                <button id="menu-btn" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <!-- Mobile Menu (Nav) -->
        <div id="mobile-menu" class="hidden fixed inset-0 z-40 bg-white p-4 pt-24">
            <div class="max-w-md mx-auto space-y-4">
                <button onclick="window.navTo('tab-dashboard')" class="w-full text-left p-4 bg-slate-50 rounded-xl font-bold text-lg hover:bg-indigo-50">📊 Dashboard</button>
                <button onclick="window.navTo('tab-data')" class="w-full text-left p-4 bg-slate-50 rounded-xl font-bold text-lg hover:bg-indigo-50">👥 Data Siswa</button>
                <button onclick="window.navTo('tab-input')" class="w-full text-left p-4 bg-slate-50 rounded-xl font-bold text-lg hover:bg-indigo-50">➕ Input Poin</button>
                <button onclick="window.navTo('tab-master')" class="w-full text-left p-4 bg-slate-50 rounded-xl font-bold text-lg hover:bg-indigo-50">⚙️ Master Admin</button>
                <button onclick="window.logout()" class="w-full text-left p-4 bg-red-50 text-red-600 rounded-xl font-bold text-lg">🚪 Logout</button>
            </div>
        </div>

        <div id="app" class="max-w-md mx-auto p-4">
            <!-- Floating Action Button -->
            <button onclick="window.showTab('tab-input')" class="fixed bottom-6 right-6 bg-indigo-700 text-white p-4 rounded-full shadow-2xl z-40 hover:scale-105 transition-all shadow-indigo-500/50">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>

            <div id="tab-dashboard" class="tab-content active">
                <h3 class="font-black text-slate-800 text-xl mb-4">Dashboard</h3>
                <button onclick="window.showTab('tab-input')" class="w-full mb-6 bg-indigo-50 border-2 border-dashed border-indigo-200 text-indigo-700 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-100 transition-all">
                    ➕ Input Pelanggaran Baru
                </button>
                <div class="space-y-6">
                    <div><h4 class="font-bold text-indigo-700 mb-3">🔥 5 Peringkat Pelanggaran</h4><div id="dashboard-ranking" class="space-y-2"></div></div>
                    <div><h4 class="font-bold text-indigo-700 mb-3">📝 Riwayat Input Terkini</h4><div id="dashboard-history" class="space-y-2"></div></div>
                </div>

            <div id="tab-data" class="tab-content">
                <h3 class="font-black text-slate-800 text-xl mb-4">Data Siswa</h3>

            </div>
            
            <div id="tab-input" class="tab-content">

                    <select id="input-siswa" class="w-full p-3 border rounded-xl font-bold"></select>

            </div>

            <div id="tab-master" class="tab-content">
                <h3 class="font-black text-slate-800 text-xl mb-4">Master Admin</h3>
                <div class="flex space-x-2 mb-4 bg-slate-100 p-1 rounded-2xl">
                    <button onclick="window.showSub('sub-kelas')" class="flex-1 py-3 text-xs font-bold bg-white rounded-xl shadow-sm">Kelas</button>
                    <button onclick="window.showSub('sub-siswa')" class="flex-1 py-3 text-xs font-bold bg-white rounded-xl shadow-sm">Siswa</button>
                    <button onclick="window.showSub('sub-kategori')" class="flex-1 py-3 text-xs font-bold bg-white rounded-xl shadow-sm">Kategori</button>
                </div>
                <div id="sub-kelas" class="sub-tab-content active"><button onclick="window.openModal('kelas')" class="w-full bg-indigo-700 text-white py-3 rounded-2xl mb-3 font-bold">+ Tambah Kelas</button><div id="list-kelas" class="space-y-2"></div></div>
                <div id="sub-siswa" class="sub-tab-content">
                    <select id="filter-siswa-master" onchange="window.renderMasterSiswa()" class="w-full p-3 mb-2 border rounded-xl font-bold"></select>
                    <button onclick="window.openModal('siswa')" class="w-full bg-indigo-700 text-white py-3 rounded-2xl mb-3 font-bold">+ Tambah Siswa</button>
                    <div class="mt-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                        <h4 class="font-bold text-indigo-900 mb-2">Impor Siswa (CSV)</h4>
                        <div class="flex gap-2">
                            <button onclick="window.downloadTemplate()" class="flex-1 bg-white py-2 rounded-xl text-xs font-bold border border-indigo-200">📥 Template</button>
                            <button onclick="document.getElementById('import-file').click()" class="flex-1 bg-indigo-600 text-white py-2 rounded-xl text-xs font-bold">📂 Pilih File</button>
                        </div>
                        <input type="file" id="import-file" accept=".csv" class="hidden" onchange="window.processImport(this)">
                    </div>
                    <div id="list-siswa-master" class="space-y-2 mt-3"></div>
                </div>
                <div id="sub-kategori" class="sub-tab-content"><button onclick="window.openModal('kategori')" class="w-full bg-indigo-700 text-white py-3 rounded-2xl mb-3 font-bold">+ Tambah Kategori</button><div id="list-kategori" class="space-y-2"></div></div>
                <div class="mt-8 pt-6 border-t border-slate-200 space-y-3">
                    <h4 class="font-bold text-slate-700">Manajemen Data</h4>
                    <button onclick="window.exportMonthly()" class="w-full bg-emerald-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-emerald-500/20">Download Laporan CSV</button>
                    <button onclick="window.showResetModal('poin')" class="w-full bg-orange-500 text-white py-3 rounded-2xl font-bold shadow-lg shadow-orange-500/20">Reset Poin Saja</button>
                    <button onclick="window.showResetModal('total')" class="w-full bg-red-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-red-500/20">Hapus Semua Data</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert -->
    <div id="custom-alert" class="fixed inset-0 bg-slate-900/50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <p id="alert-msg" class="font-bold text-lg mb-6"></p>
            <button onclick="document.getElementById('custom-alert').classList.add('hidden')" class="w-full py-3 bg-indigo-700 text-white rounded-2xl font-bold">Oke</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl">
            <h3 id="modal-title" class="font-black text-slate-800 text-lg mb-4">Edit Data</h3>
            <div id="modal-body" class="space-y-3"></div>
            <div class="flex gap-2 mt-6">
                <button id="btn-batal" onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 py-3 bg-slate-100 rounded-2xl font-bold">Batal</button>
                <button id="btn-save-modal" onclick="window.saveModal()" class="flex-1 py-3 bg-indigo-700 text-white rounded-2xl font-bold">Simpan</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtL5s29f9GcuKD6p_gmCKBwY-29ndfYNc",
            authDomain: "poin-rpl.firebaseapp.com",
            databaseURL: "https://poin-rpl-default-rtdb.firebaseio.com/",
            projectId: "poin-rpl",
            storageBucket: "poin-rpl.firebasestorage.app",
            messagingSenderId: "91115374100",
            appId: "1:91115374100:web:e7d69920b62bf94653c901"
        };

        const db = getDatabase(initializeApp(firebaseConfig), "https://poin-rpl-default-rtdb.firebaseio.com/");
        const ADMIN_PASSWORD = "RPL123"; 

        // CEK STATUS LOGIN SAAT DIMUAT
        if (localStorage.getItem('karma_is_logged_in') === 'true') {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            signInAnonymously(getAuth());
        }

        window.logout = () => {
            localStorage.removeItem('karma_is_logged_in');
            location.reload();
        };

        window.handleLogin = () => { 
            if(document.getElementById('admin-password').value !== ADMIN_PASSWORD) return window.showAlert('Password Salah!'); 
            
            localStorage.setItem('karma_is_logged_in', 'true');
            signInAnonymously(getAuth()).then(() => { 
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('main-content').classList.remove('hidden'); 
            }); 
        };

        // --- Fungsi Fungsi Utama ---
        document.getElementById('menu-btn').onclick = () => document.getElementById('mobile-menu').classList.toggle('hidden');
        window.navTo = (id) => { document.getElementById('mobile-menu').classList.add('hidden'); window.showTab(id); };
        window.showTab = (t) => { document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active')); document.getElementById(t).classList.add('active'); };
        window.showSub = (t) => { document.querySelectorAll('.sub-tab-content').forEach(e => e.classList.remove('active')); document.getElementById(t).classList.add('active'); };
        document.getElementById('input-tanggal').valueAsDate = new Date();

        let dataSiswa = [], dataKategori = [], dataKelas = [], dataTransaksi = [], modalType = '', editId = '';
        
        window.deleteData = function(path){
            document.getElementById("modal-title").textContent = "Konfirmasi Hapus";
            document.getElementById("modal-body").innerHTML = `<div class="text-center"><div class="w-16 h-16 mx-auto rounded-full bg-red-100 flex items-center justify-center text-3xl">🗑️</div><h3 class="mt-4 text-xl font-bold">Hapus Data?</h3><p class="text-slate-500 mt-2">Data yang dihapus tidak dapat dikembalikan.</p></div>`;
            const btn = document.getElementById("btn-save-modal");
            btn.textContent = "Ya, Hapus";
            btn.className = "flex-1 py-3 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700";
            btn.onclick = async () => { await remove(ref(db, path)); document.getElementById("modal").classList.add("hidden"); btn.textContent = "Simpan"; btn.className = "flex-1 py-3 bg-indigo-700 text-white rounded-2xl font-bold"; window.showAlert("Data berhasil dihapus"); };
            document.getElementById("modal").classList.remove("hidden");
        }

        window.downloadTemplate = () => { const csvContent = "Nama,Kelas\nContoh Siswa,X RPL 1\nBudi Santoso,XI RPL 1"; const blob = new Blob([csvContent], { type: 'text/csv' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'template_siswa.csv'; a.click(); };
        window.processImport = (input) => { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { const text = e.target.result; const lines = text.split('\n').slice(1); lines.forEach(line => { const [name, kelas] = line.split(','); if (name && kelas) { push(ref(db, 'siswa'), { name: name.trim(), kelas: kelas.trim() }); } }); window.showAlert('Import data berhasil!'); input.value = ''; }; reader.readAsText(file); };
        
        window.printSurat = (siswaId, name, tglPemanggilan, noSurat) => {
            const s = dataSiswa.find(x => x.id === siswaId);
            const trans = dataTransaksi.filter(t => t.siswaId === siswaId);
            const total = trans.reduce((sum, t) => sum + (parseInt(t.poin) || 0), 0);
            const printWindow = window.open('', '_blank');
            const dateStr = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            let html = `
            <html>
            <head>
                <style>
                    body { font-family: 'Arial', sans-serif; padding: 20px; line-height: 1.5; color: #333; }
                    .kop { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px; }
                    .kop div { line-height: 1.2; font-weight: bold; text-transform: uppercase; }
                    .kop p { margin: 2px 0; font-size: 0.9em; text-transform: none; }
                    .content { margin: 20px 0; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                    th, td { border: 1px solid #000; padding: 8px; text-align: left; }
                    th { background-color: #f2f2f2; }
                    .signature { text-align: right; margin-top: 40px; float: right; width: 300px; }
                    .page-break { page-break-before: always; }
                </style>
            </head>
            <body>
                <div class="kop">
                    <div>PEMERINTAH DAERAH PROVINSI JAWA BARAT</div>
                    <div>DINAS PENDIDIKAN</div>
                    <div>CABANG DINAS PENDIDIKAN WILAYAH IV</div>
                    <div style="font-size: 1.2em;">SEKOLAH MENENGAH KEJURUAN NEGERI KASOMALANG</div>
                    <p>Jln. Sukajaya Kasomalang Kulon Telp. (0260) 4741181 Kasomalang - Subang 41281</p>
                    <p>E-Mail: smknekas@gmail.com | Website: http://smknkasomalang.sch.id</p>
                </div>

                <div class="content">
                    <p><strong>Nomor:</strong> ${noSurat || '..........................'}</p>
                    <p><strong>Perihal:</strong> Undangan Komunikasi Perkembangan Siswa</p>
                    <br>
                    <p>Yth. Bapak/Ibu Orang Tua/Wali dari <strong>${name}</strong> (${s?.kelas || '-'}),</p>
                    
                    <p>Dengan hormat, kami mengharapkan kehadiran Bapak/Ibu di sekolah untuk mendiskusikan perkembangan putra-putri Bapak/Ibu terkait kedisiplinan, pada:</p>
                    
                    <p style="margin-left: 20px;">
                        <strong>Hari/Tanggal:</strong> ${tglPemanggilan || '..........................'}<br>
                        <strong>Waktu:</strong> 08.00 s.d. 14.00 WIB<br>
                        <strong>Tempat:</strong> Ruang Guru/BK SMKN Kasomalang
                    </p>
                    
                    <p>Pertemuan ini sangat penting guna mencari solusi terbaik demi masa depan dan kesuksesan ${name}. Kehadiran Bapak/Ibu akan sangat membantu kami dalam menyelaraskan pembinaan di sekolah dan di rumah.</p>
                    
                    <p>Demikian undangan ini kami sampaikan. Atas perhatian dan kerja sama yang baik, kami ucapkan terima kasih.</p>
                </div>

                <div class="signature">
                    <p>Kasomalang, ${dateStr}</p>
                    <p>...........................................,</p>
                    <br><br><br>
                    <p>(..........................................)</p>
                </div>

                <div class="page-break">
                    <h4>LAMPIRAN: Riwayat Poin Pelanggaran</h4>
                    <p>Berikut adalah catatan detail akumulasi poin sebesar <strong>${total} poin</strong>:</p>
                    <table>
                        <thead><tr><th>Tanggal</th><th>Kategori</th><th>Poin</th></tr></thead>
                        <tbody>
                            ${trans.map(t => `<tr><td>${t.date}</td><td>${t.kategori}</td><td>${t.poin}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </body>
            </html>`;

            printWindow.document.write(html);
            printWindow.document.close();
            setTimeout(() => { printWindow.print(); }, 500);
        };

window.renderDashboard = () => {
  // Fungsi hitung waktu lalu yang kebal masalah perbedaan zona waktu (Timezone)
  const hitungWaktuLalu = (dateString) => {
    try {
      if (!dateString) return '';
      
      // Mengubah string tanggal input menjadi angka milidetik lokal
      const waktuInput = new Date(dateString).getTime();
      // Mengambil angka milidetik waktu sekarang
      const sekarang = new Date().getTime();
      
      if (isNaN(waktuInput)) return dateString;

      // Hitung selisih mutlak dalam detik
      const selisihDetik = Math.floor((sekarang - waktuInput) / 1000);

      // Antisipasi jika ada selisih sekian milidetik komputer yang membuatnya minus
      if (selisihDetik < 60) return 'Baru saja';
      
      const selisihMenit = Math.floor(selisihDetik / 60);
      if (selisihMenit < 60) return `${selisihMenit} menit yang lalu`;
      
      const selisihJam = Math.floor(selisihMenit / 60);
      if (selisihJam < 24) return `${selisihJam} jam yang lalu`;
      
      const selisihHari = Math.floor(selisihJam / 24);
      if (selisihHari === 1) return 'Kemarin';
      return `${selisihHari} hari yang lalu`;
    } catch (e) {
      return dateString || '';
    }
  };

  // 1. HITUNG DAN TAMPILKAN RANKING (Top 10)
  const points = {};
  dataTransaksi.forEach(t => {
    if (t && t.siswaId) {
      const nilaiPoin = parseInt(t.poin || 0);
      points[t.siswaId] = (points[t.siswaId] || 0) + nilaiPoin;
    }
  });

  const ranking = dataSiswa
    .map(s => ({ ...s, total: points[s.id] || 0 }))
    .filter(s => s.total > 0)
    .sort((a, b) => b.total - a.total)
    .slice(0, 10);

  document.getElementById('dashboard-ranking').innerHTML = ranking.length 
    ? ranking.map((s, i) => `
        <div class="flex justify-between p-3 bg-white border border-slate-100 rounded-2xl shadow-sm">
          <span>${i + 1}. ${s.name}</span>
          <b class="text-red-600">${s.total} Poin</b>
        </div>
      `).join('') 
    : '<p class="text-slate-400 text-sm">Belum ada pelanggaran</p>';


  // 2. TAMPILKAN RIWAYAT TERBARU (Top 10)
  const history = [...dataTransaksi].reverse().slice(0, 10);

  document.getElementById('dashboard-history').innerHTML = history.length 
    ? history.map(t => {
        const s = dataSiswa.find(x => x.id === t.siswaId);
        const waktuLalu = hitungWaktuLalu(t.date); 
        
        return `
          <div class="p-3 bg-white border border-slate-100 rounded-2xl shadow-sm text-sm">
            <div class="flex justify-between font-bold">
              <span>${s?.name || 'Siswa'}</span>
              <span class="text-red-600">${t.poin || 0} Poin</span>
            </div>
            <p class="text-slate-500 text-xs">${t.kategori || 'Pelanggaran'} • <span class="font-medium text-blue-600">${waktuLalu}</span></p>
          </div>
        `;
      }).join('') 
    : '<p class="text-slate-400 text-sm">Belum ada riwayat</p>';
};

// Jalankan fungsi
window.renderDashboard();

        window.exportToCSV = (filename, data) => { const csvContent = "data:text/csv;charset=utf-8," + data.map(row => row.join(",")).join("\n"); const encodedUri = encodeURI(csvContent); const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", filename); document.body.appendChild(link); link.click(); };
        window.exportMonthly = () => { const header = ["Nama Siswa", "Kelas", "Kategori", "Poin", "Tanggal"]; const rows = dataTransaksi.map(t => { const s = dataSiswa.find(x => x.id === t.siswaId); return [s ? s.name : "Unknown", s ? s.kelas : "-", t.kategori, t.poin, t.date]; }); window.exportToCSV("laporan_poin.csv", [header, ...rows]); };
        window.showAlert = (msg) => { document.getElementById('alert-msg').textContent = msg; document.getElementById('custom-alert').classList.remove('hidden'); };
        window.getWarningBadge = (poin) => { if (poin < 40) return '<span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">Aman</span>'; if (poin < 70) return '<span class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full font-bold">Pembinaan 1</span>'; if (poin < 100) return '<span class="text-[10px] bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-bold">Pembinaan 2</span>'; return '<span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold">Panggilan Ortu</span>'; };
        window.filterInputSiswa = () => { const k = document.getElementById('input-kelas').value; document.getElementById('input-siswa').innerHTML = '<option value="">Pilih Siswa</option>' + dataSiswa.filter(s => !k || s.kelas === k).map(s => `<option value="${s.id}">${s.name}</option>`).join(''); };
        window.autoFillPoin = () => { const cat = dataKategori.find(x => x.id === document.getElementById('input-kategori').value); document.getElementById('input-jumlah').value = cat ? cat.poin : 0; };

window.saveTransaction = () => {
  const siswaId = document.getElementById('input-siswa').value;
  const catId = document.getElementById('input-kategori').value;
  const dateInput = document.getElementById('input-tanggal').value; // Contoh: "2026-07-08"
  
  const cat = dataKategori.find(x => x.id === catId);
  if (!siswaId || !cat || !dateInput) return window.showAlert('Lengkapi Data!');

  // AMBIL JAM, MENIT, DETIK SAAT INI (ZONA INDONESIA)
  const sekarang = new Date();
  const jam = String(sekarang.getHours()).padStart(2, '0');
  const menit = String(sekarang.getMinutes()).padStart(2, '0');
  const detik = String(sekarang.getSeconds()).padStart(2, '0');
  
  // MENGGANTI 'T' MENJADI SPASI 
  // Ditambahkan '+07:00' di akhir agar dibaca akurat sebagai WIB oleh fungsi hitungWaktuLalu
  const tanggalLengkapWIB = `${dateInput} ${jam}:${menit}:${detik}+07:00`;

  // SIMPAN KE FIREBASE
  push(ref(db, 'transaksi'), {
    siswaId,
    kategori: cat.nama,
    poin: cat.poin,
    date: tanggalLengkapWIB 
  });

  window.showAlert('Data poin tersimpan!');
};

        window.showResetModal = (type) => { const btn = document.getElementById('btn-save-modal'); btn.classList.remove('hidden'); document.getElementById('modal-title').textContent = type === 'poin' ? 'Reset Poin' : 'Hapus Semua Data'; document.getElementById('modal-body').innerHTML = type === 'poin' ? '<p>Yakin reset semua poin siswa?</p>' : '<p class="text-red-600 font-bold">Yakin hapus SEMUA data?</p>'; btn.textContent = 'Ya, Lanjutkan'; btn.onclick = () => { if(type === 'poin') remove(ref(db, 'transaksi')); else { remove(ref(db, 'kelas')); remove(ref(db, 'siswa')); remove(ref(db, 'kategori')); remove(ref(db, 'transaksi')); } document.getElementById('modal').classList.add('hidden'); window.showAlert('Data telah dibersihkan!'); }; document.getElementById('modal').classList.remove('hidden'); };
        window.openModal = (type, id = '') => { modalType = type; editId = id; const btn = document.getElementById('btn-save-modal'); btn.classList.remove('hidden'); btn.textContent = 'Simpan'; btn.onclick = window.saveModal; document.getElementById('modal-title').textContent = (id ? 'Edit ' : 'Tambah ') + type.toUpperCase(); let html = ''; if(type === 'kelas') html = `<input id="m-nama" value="${dataKelas.find(x=>x.id==id)?.nama||''}" class="w-full p-3 border rounded-xl" placeholder="Nama Kelas">`; else if(type === 'siswa') html = `<input id="m-nama" value="${dataSiswa.find(x=>x.id==id)?.name||''}" class="w-full p-3 border rounded-xl" placeholder="Nama Siswa"><select id="m-kelas" class="w-full p-3 border rounded-xl">${dataKelas.map(k=>`<option value="${k.nama}">${k.nama}</option>`).join('')}</select>`; else if(type === 'kategori') html = `<input id="m-nama" value="${dataKategori.find(x=>x.id==id)?.nama||''}" class="w-full p-3 border rounded-xl" placeholder="Nama Kategori"><input type="number" id="m-poin" value="${dataKategori.find(x=>x.id==id)?.poin||0}" class="w-full p-3 border rounded-xl" placeholder="Poin">`; document.getElementById('modal-body').innerHTML = html; document.getElementById('modal').classList.remove('hidden'); };
        window.saveModal = () => { const updates = {}; if(modalType === 'kelas') updates.nama = document.getElementById('m-nama').value; else if(modalType === 'siswa') { updates.name = document.getElementById('m-nama').value; updates.kelas = document.getElementById('m-kelas').value; } else if(modalType === 'kategori') { updates.nama = document.getElementById('m-nama').value; updates.poin = parseInt(document.getElementById('m-poin').value); } if(editId) update(ref(db, modalType+'/'+editId), updates); else push(ref(db, modalType), updates); document.getElementById('modal').classList.add('hidden'); window.showAlert('Data berhasil disimpan!'); };
        window.showHistory = (id, name) => { const trans = dataTransaksi.filter(t => t.siswaId === id); const total = trans.reduce((s, t) => s + (parseInt(t.poin) || 0), 0); document.getElementById('modal-title').textContent = 'Riwayat: ' + name; document.getElementById('btn-save-modal').classList.add('hidden'); document.getElementById('modal-body').innerHTML = `<div class="text-center">${window.getWarningBadge(total)} <b class="block text-3xl mt-1">${total} Poin</b></div><div class="space-y-2 max-h-60 overflow-y-auto mt-4">${trans.map(t => `<div class="flex justify-between border-b pb-1 text-xs"><div><p class="font-bold">${t.kategori}</p><p class="text-slate-500">${t.date}</p></div><span class="font-bold text-lg">${t.poin}</span></div>`).join('') || '<p class="text-slate-500">Belum ada riwayat</p>'}</div><button onclick="window.printSurat('${id}', '${name}')" class="w-full mt-4 bg-indigo-700 text-white py-3 rounded-xl font-bold">Cetak Surat Panggilan</button>`; document.getElementById('modal').classList.remove('hidden'); };
        window.renderMasterSiswa = () => { const k = document.getElementById('filter-siswa-master').value; document.getElementById('list-siswa-master').innerHTML = dataSiswa.filter(s => !k || s.kelas === k).map(s => `<div class="flex justify-between items-center p-3 bg-slate-50 border rounded-2xl"><span>${s.name} (${s.kelas})</span><div><button onclick="window.openModal('siswa', '${s.id}')" class="text-indigo-600 mr-3 font-bold">Edit</button><button onclick="window.deleteData('siswa/${s.id}')" class="text-red-600 font-bold">Hapus</button></div></div>`).join(''); };
        window.renderDataSiswa = () => { const k = document.getElementById('filter-siswa-kelas').value; document.getElementById('list-data-siswa').innerHTML = dataSiswa.filter(s => !k || s.kelas === k).map(s => { const total = dataTransaksi.filter(t => t.siswaId === s.id).reduce((sum, t) => sum + (parseInt(t.poin) || 0), 0); return `<div class="p-4 bg-white border border-slate-100 rounded-3xl flex justify-between items-center cursor-pointer shadow-sm" onclick="window.showHistory('${s.id}', '${s.name}')"><div><b class="text-slate-800">${s.name}</b><p class="text-xs text-slate-500">${s.kelas}</p></div><div class="text-right"><div class="font-black text-indigo-700">${total} Poin</div>${window.getWarningBadge(total)}</div></div>`; }).join(''); };
        window.renderMaster = () => { document.getElementById('list-kelas').innerHTML = dataKelas.map(k => `<div class="flex justify-between items-center p-3 bg-slate-50 border rounded-2xl"><span>${k.nama}</span><div><button onclick="window.openModal('kelas', '${k.id}')" class="text-indigo-600 mr-3 font-bold">Edit</button><button onclick="window.deleteData('kelas/${k.id}')" class="text-red-600 font-bold">Hapus</button></div></div>`).join(''); document.getElementById('list-kategori').innerHTML = dataKategori.map(k => `<div class="flex justify-between items-center p-3 bg-slate-50 border rounded-2xl"><span>${k.nama} (${k.poin})</span><div><button onclick="window.openModal('kategori', '${k.id}')" class="text-indigo-600 mr-3 font-bold">Edit</button><button onclick="window.deleteData('kategori/${k.id}')" class="text-red-600 font-bold">Hapus</button></div></div>`).join(''); const selects = [document.getElementById('filter-siswa-kelas'), document.getElementById('filter-siswa-master'), document.getElementById('input-kelas')]; selects.forEach(sel => { if(sel) sel.innerHTML = '<option value="">Semua Kelas</option>' + dataKelas.map(k => `<option value="${k.nama}">${k.nama}</option>`).join(''); }); document.getElementById('input-kategori').innerHTML = '<option value="">Pilih Kategori</option>' + dataKategori.map(k => `<option value="${k.id}">${k.nama}</option>`).join(''); window.renderMasterSiswa(); window.renderDataSiswa(); };
        
        onValue(ref(db, 'kelas'), s => { dataKelas = Object.entries(s.val()||{}).map(([id,v])=>({id,...v})); window.renderMaster(); });
        onValue(ref(db, 'siswa'), s => { dataSiswa = Object.entries(s.val()||{}).map(([id,v])=>({id,...v})); window.renderMaster(); });
        onValue(ref(db, 'kategori'), s => { dataKategori = Object.entries(s.val()||{}).map(([id,v])=>({id,...v})); window.renderMaster(); });
        onValue(ref(db, 'transaksi'), s => { dataTransaksi = Object.entries(s.val()||{}).map(([id,v])=>({id,...v})); window.renderDataSiswa(); window.renderDashboard(); });
    </script>
</body>
</html>
