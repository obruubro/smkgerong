<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tic Tac Toe - Karya Siswa RPL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5B4BFF,#7A6CFF);
}

.container{
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{
    color:#5B4BFF;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

.status{
    font-size:18px;
    font-weight:600;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
}

.cell{
    width:100px;
    height:100px;
    background:#F5F7FF;
    border:none;
    border-radius:15px;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
}

.cell:hover{
    background:#ECEFFF;
}

.btn{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#5B4BFF;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.back{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    color:#5B4BFF;
    font-weight:600;
}

@media(max-width:500px){

.board{
    grid-template-columns:repeat(3,80px);
}

.cell{
    width:80px;
    height:80px;
}

}

</style>
</head>
<body>

<div class="container">

<h1>❌⭕ Tic Tac Toe</h1>

<p class="subtitle">
Karya Siswa RPL SMK Negeri Kasomalang
</p>

<div class="status" id="status">
Giliran X
</div>

<div class="board">

<button class="cell"></button>
<button class="cell"></button>
<button class="cell"></button>

<button class="cell"></button>
<button class="cell"></button>
<button class="cell"></button>

<button class="cell"></button>
<button class="cell"></button>
<button class="cell"></button>

</div>

<button class="btn" onclick="resetGame()">
Main Lagi
</button>

<br>

<a href="../../proyek_siswa.html" class="back">
← Kembali ke Proyek Siswa
</a>

</div>

<script>

const cells=document.querySelectorAll('.cell');
const statusText=document.getElementById('status');

let currentPlayer='X';
let gameActive=true;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach((cell,index)=>{

cell.addEventListener('click',()=>{

if(cell.textContent!=='' || !gameActive){
return;
}

cell.textContent=currentPlayer;

checkWinner();

if(gameActive){
currentPlayer=currentPlayer==='X' ? 'O' : 'X';
statusText.textContent='Giliran '+currentPlayer;
}

});

});

function checkWinner(){

for(let pattern of winPatterns){

const a=cells[pattern[0]].textContent;
const b=cells[pattern[1]].textContent;
const c=cells[pattern[2]].textContent;

if(a && a===b && b===c){

statusText.textContent='🎉 Pemain '+a+' Menang!';
gameActive=false;
return;

}

}

const draw=[...cells].every(cell=>cell.textContent!=='');

if(draw){

statusText.textContent='🤝 Seri!';
gameActive=false;

}

}

function resetGame(){

cells.forEach(cell=>{
cell.textContent='';
});

currentPlayer='X';
gameActive=true;
statusText.textContent='Giliran X';

}

</script>

</body>
</html>
